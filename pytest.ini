[pytest]
# #382 E7: minimal pytest config. The existing bare-__main__ test scripts are
# run by tests/run_all.py, not pytest; this config is for NEW pytest-style
# tests (def test_*). Kept in its own file (not pyproject) so it can't be
# mistaken for packaging config.
testpaths = tests
python_files = test_*.py
python_functions = test_*
markers =
    integration: test shells out to a CLI or routes a real board (slow); deselected by --fast.
