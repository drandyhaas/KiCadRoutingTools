[pytest]
# Scope default pytest runs to the smoke suite only.
#
# The upstream tests/ directory contains long-running integration
# scripts invoked as `python3 tests/test_*.py --all` — they are NOT
# pytest-compatible by default and require large .kicad_pcb fixtures.
# Keeping testpaths narrow prevents accidental collection of those
# scripts while still allowing `pytest tests/` to be run explicitly.
testpaths = tests/smoke
